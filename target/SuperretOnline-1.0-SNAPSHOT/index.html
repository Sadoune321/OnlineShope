<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniShop</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream:      #faf6f0;
            --cream-dark: #f0e9de;
            --warm-white: #fffdf9;
            --gold:       #c9a84c;
            --gold-light: #e8c97a;
            --gold-dark:  #9a7530;
            --brown:      #5c3d2e;
            --brown-light:#8b6552;
            --text:       #2c1a0e;
            --text-2:     #7a5c48;
            --text-3:     #b8a090;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--cream);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ── BLOBS CRÈME ── */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.55;
            animation: float 10s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }
        .blob-1 {
            width: 600px; height: 600px;
            background: radial-gradient(circle, #e8c97a, #f0e9de);
            top: -150px; left: -150px;
            animation-delay: 0s;
        }
        .blob-2 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, #d4b896, #f5ece0);
            bottom: -100px; right: -100px;
            animation-delay: 4s;
        }
        .blob-3 {
            width: 350px; height: 350px;
            background: radial-gradient(circle, #f7dfc0, #faf6f0);
            top: 55%; left: 55%;
            animation-delay: 2s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0,0) scale(1); }
            50%       { transform: translate(18px, -18px) scale(1.04); }
        }

        /* ── CARD ── */
        .card {
            position: relative;
            z-index: 1;
            background: rgba(255,253,249,0.78);
            backdrop-filter: blur(32px) saturate(160%);
            -webkit-backdrop-filter: blur(32px) saturate(160%);
            border: 1px solid rgba(201,168,76,0.22);
            border-radius: 32px;
            padding: 52px 48px;
            max-width: 460px;
            width: 90%;
            box-shadow: 0 4px 0 rgba(150,110,80,0.20), 0 20px 60px rgba(92,61,46,0.14);
            animation: fadeUp 0.9s cubic-bezier(0.34, 1.4, 0.64, 1) both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ── LOGO ── */
        .logo {
            display: flex;
            align-items: center;
            gap: 13px;
            margin-bottom: 36px;
        }

        .logo-mark {
            width: 50px; height: 50px;
            background: linear-gradient(145deg, var(--gold-light), var(--gold-dark));
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 4px 0 var(--gold-dark), 0 8px 24px rgba(201,168,76,0.35);
            transform: perspective(120px) rotateX(6deg);
            transition: transform 0.4s cubic-bezier(0.34,1.4,0.64,1);
        }

        .logo-mark:hover {
            transform: perspective(120px) rotateX(0deg) translateY(-2px);
        }

        .logo-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.75rem;
            font-weight: 600;
            color: var(--brown);
            letter-spacing: 0.5px;
        }

        .logo-name span { color: var(--gold-dark); }

        /* ── TITRE ── */
        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.4rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            line-height: 1.15;
            margin-bottom: 13px;
            color: var(--brown);
        }

        p.subtitle {
            font-size: 0.95rem;
            color: var(--text-2);
            line-height: 1.65;
            margin-bottom: 38px;
        }

        /* ── STATS ── */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 38px;
        }

        .stat {
            background: rgba(201,168,76,0.08);
            border: 1px solid rgba(201,168,76,0.18);
            border-radius: 16px;
            padding: 15px 10px;
            text-align: center;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.6);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .stat:hover {
            transform: translateY(-3px);
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.6), 0 6px 18px rgba(201,168,76,0.18);
        }

        .stat-value {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.7rem;
            font-weight: 700;
            color: var(--gold-dark);
            letter-spacing: -0.5px;
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-3);
            margin-top: 4px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        /* ── BOUTON ── */
        .btn-enter {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 17px;
            background: linear-gradient(145deg, var(--brown), var(--brown-light));
            color: var(--cream);
            border: none;
            border-radius: 16px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            text-decoration: none;
            letter-spacing: 0.2px;
            box-shadow: 0 4px 0 var(--gold-dark), 0 8px 28px rgba(92,61,46,0.28);
            transition: all 0.25s cubic-bezier(0.34, 1.4, 0.64, 1);
        }

        .btn-enter:hover {
            transform: translateY(-3px);
            box-shadow: 0 7px 0 var(--gold-dark), 0 14px 36px rgba(92,61,46,0.32);
        }

        .btn-enter:active {
            transform: translateY(1px);
            box-shadow: 0 2px 0 var(--gold-dark), 0 4px 14px rgba(92,61,46,0.22);
        }

        .btn-arrow { transition: transform 0.2s ease; }
        .btn-enter:hover .btn-arrow { transform: translateX(5px); }

        /* ── FOOTER ── */
        footer {
            position: fixed;
            bottom: 24px;
            z-index: 1;
            font-size: 0.75rem;
            color: var(--text-3);
            letter-spacing: 0.3px;
        }
    </style>
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="card">

        <div class="logo">
            <div class="logo-mark">🛍</div>
            <div class="logo-name">Mini<span>Shop</span></div>
        </div>

        <h1>Votre boutique<br>en ligne.</h1>
        <p class="subtitle">Découvrez notre catalogue, ajoutez vos produits préférés et passez commande en quelques secondes.</p>

        <div class="stats">
            <div class="stat">
                <div class="stat-value">5+</div>
                <div class="stat-label">Produits</div>
            </div>
            <div class="stat">
                <div class="stat-value">24/7</div>
                <div class="stat-label">Disponible</div>
            </div>
            <div class="stat">
                <div class="stat-value">100%</div>
                <div class="stat-label">Sécurisé</div>
            </div>
        </div>

        <!-- FLUX : index.html → GET /shop → Servlet → index.jsp -->
        <a href="shop" class="btn-enter">
            Accéder à la boutique
            <span class="btn-arrow">→</span>
        </a>

    </div>

    <footer>MiniShop · Architecture Hexagonale · Jakarta EE 10</footer>

</body>
</html>
